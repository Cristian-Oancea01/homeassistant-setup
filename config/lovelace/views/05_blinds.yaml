# lovelace/views/05_blinds.yaml
# Blinds view — VELUX covers with individual and group control.
# Replace cover entity IDs with your actual VELUX entities.

title: Blinds
path: blinds
icon: mdi:blinds
cards:

  - type: custom:mushroom-title-card
    title: VELUX Blinds

  # ── Group quick controls ───────────────────────────────────
  - type: horizontal-stack
    cards:
      - type: custom:button-card
        name: All Open
        icon: mdi:blinds-open
        tap_action:
          action: call-service
          service: cover.open_cover
          service_data:
            entity_id: cover.all_velux_covers    # group created via cover_groups.yaml
        styles:
          card:
            - border-radius: 12px

      - type: custom:button-card
        name: All Close
        icon: mdi:blinds
        tap_action:
          action: call-service
          service: cover.close_cover
          service_data:
            entity_id: cover.all_velux_covers
        styles:
          card:
            - border-radius: 12px

      - type: custom:button-card
        name: "50%"
        icon: mdi:blinds-horizontal
        tap_action:
          action: call-service
          service: cover.set_cover_position
          service_data:
            entity_id: cover.all_velux_covers
            position: 50
        styles:
          card:
            - border-radius: 12px

  # ── Individual blinds ──────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Individual Blinds

  - type: custom:mushroom-cover-card
    entity: cover.velux_living_room          # replace
    name: Living Room
    show_buttons_control: true
    show_position_control: true

  - type: custom:mushroom-cover-card
    entity: cover.velux_bedroom              # replace
    name: Bedroom
    show_buttons_control: true
    show_position_control: true

  - type: custom:mushroom-cover-card
    entity: cover.velux_kitchen              # replace
    name: Kitchen
    show_buttons_control: true
    show_position_control: true

  - type: custom:mushroom-cover-card
    entity: cover.velux_office              # replace
    name: Office
    show_buttons_control: true
    show_position_control: true
