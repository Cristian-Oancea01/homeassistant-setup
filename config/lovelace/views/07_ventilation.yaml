# lovelace/views/04_ventilation.yaml
# Ventilation view — Komfovent HRV full control card.

title: Ventilation
path: ventilation
icon: mdi:air-filter
cards:

  - type: custom:mushroom-title-card
    title: Komfovent HRV
    subtitle: Heat Recovery Ventilation

  # ── Climate entity ─────────────────────────────────────────
  - type: custom:mushroom-climate-card
    entity: climate.komfovent
    name: Komfovent
    show_temperature_control: true
    hvac_modes:
      - auto
      - fan_only
      - "off"

  # ── Mode selector buttons ──────────────────────────────────
  - type: custom:mushroom-title-card
    title: Mode

  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:button-card
        name: Normal
        icon: mdi:fan
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.komfovent_current_mode
            option: normal
        styles:
          card:
            - border-radius: 12px

      - type: custom:button-card
        name: Boost
        icon: mdi:fan-plus
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.komfovent_current_mode
            option: boost
        styles:
          card:
            - border-radius: 12px

      - type: custom:button-card
        name: Away
        icon: mdi:home-export-outline
        tap_action:
          action: call-service
          service: select.select_option
          service_data:
            entity_id: select.komfovent_current_mode
            option: away
        styles:
          card:
            - border-radius: 12px

  # ── Sensor readings ────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Sensors

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.komfovent_supply_temperature
        name: Supply
        icon: mdi:thermometer-chevron-up
        icon_color: orange

      - type: custom:mushroom-entity-card
        entity: sensor.komfovent_extract_temperature
        name: Extract
        icon: mdi:thermometer-chevron-down
        icon_color: blue

      - type: custom:mushroom-entity-card
        entity: sensor.komfovent_outdoor_temperature
        name: Outdoor
        icon: mdi:thermometer
        icon_color: teal

  # ── Temperature history ────────────────────────────────────
  - type: custom:mini-graph-card
    name: Temperature History
    entities:
      - entity: sensor.komfovent_supply_temperature
        name: Supply air
        color: "#f6a623"
      - entity: sensor.komfovent_extract_temperature
        name: Extract air
        color: "#4a90d9"
    hours_to_show: 12
    points_per_hour: 4
    line_width: 2
    smoothing: true
    show:
      labels: true
      legend: true

  # ── Power & energy ─────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Power & Energy

  # Current instantaneous power draw (W) — NOT daily/total energy
  - type: custom:mushroom-entity-card
    entity: sensor.komfovent_power_consumption
    name: Current Power
    icon: mdi:lightning-bolt
    icon_color: amber

  # Power history over last 6 hours
  - type: custom:mini-graph-card
    name: Power Consumption (W)
    entities:
      - entity: sensor.komfovent_power_consumption
        name: AHU power
        color: "#e8a020"
      - entity: sensor.komfovent_heater_power
        name: Heater power
        color: "#e05020"
    hours_to_show: 6
    points_per_hour: 4
    line_width: 2
    smoothing: true
    show:
      labels: true
      legend: true

  # Lifetime cumulative totals — odometer values, NOT daily usage
  - type: entities
    title: Lifetime Energy Totals
    entities:
      - entity: sensor.komfovent_total_ahu_energy
        name: Total AHU energy (lifetime)
      - entity: sensor.komfovent_total_heater_energy
        name: Total heater energy (lifetime)
      - entity: sensor.komfovent_total_recovered_energy
        name: Total recovered energy (lifetime)
