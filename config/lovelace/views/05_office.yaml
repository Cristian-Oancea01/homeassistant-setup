# lovelace/views/05_office.yaml
# Office 1 — main office with desk setup
# Real entity IDs are in AGENTS.local.md on the NAS (not committed)

title: Office 1
path: office
icon: mdi:desk

cards:

  # ══ AC ════════════════════════════════════════════════════════

  - type: custom:mushroom-climate-card
    entity: climate.room_air_conditioner    # replace — Samsung AC
    name: AC
    show_temperature_control: true
    hvac_modes:
      - "off"
      - cool
      - heat
      - fan_only
      - dry
      - auto

  - type: horizontal-stack
    cards:
      - type: custom:mushroom-entity-card
        entity: sensor.room_air_conditioner_temperature    # replace
        name: Temperature
        icon: mdi:thermometer
        icon_color: orange

      - type: custom:mushroom-entity-card
        entity: sensor.room_air_conditioner_power    # replace
        name: Power
        icon: mdi:lightning-bolt
        icon_color: yellow

      - type: custom:mushroom-entity-card
        entity: sensor.room_air_conditioner_energy    # replace
        name: Energy
        icon: mdi:meter-electric
        icon_color: green

  # ══ LIGHTS ════════════════════════════════════════════════════

  - type: custom:mushroom-title-card
    title: Lights

  - type: grid
    columns: 2
    square: false
    cards:

      # Main ceiling light (Hue room group — controls all Hue bulbs in the room)
      - type: custom:mushroom-light-card
        entity: light.office_1_ceiling_group    # replace — Hue room group
        name: Ceiling
        icon: mdi:ceiling-light
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

      # Display shelf / cabinet (individual Hue bulb)
      - type: custom:mushroom-light-card
        entity: light.office_1_ceiling    # replace — individual Hue bulb
        name: Display Cabinet
        icon: mdi:bookshelf
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

  # ── Shelves (lightstrips) ─────────────────────────────────────

  - type: custom:mushroom-title-card
    subtitle: Shelves

  - type: grid
    columns: 2
    square: false
    cards:

      # Combined shelf group
      - type: custom:mushroom-light-card
        entity: light.group_office_1_shelves    # replace — HA group: upper + lower shelf
        name: Shelves (All)
        icon: mdi:led-strip-variant
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.office_1_shelf_upper    # replace — upper shelf lightstrip
        name: Shelf Upper
        icon: mdi:led-strip-variant
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.office_1_shelf_lower    # replace — lower shelf lightstrip
        name: Shelf Lower
        icon: mdi:led-strip-variant
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true

  # ── Desk Setup ────────────────────────────────────────────────

  - type: custom:mushroom-title-card
    subtitle: Desk Setup

  - type: grid
    columns: 2
    square: false
    cards:

      # Combined desk group
      - type: custom:mushroom-light-card
        entity: light.group_office_1_desk_setup    # replace — HA group: desk + PC bars
        name: Desk Setup (All)
        icon: mdi:desk-lamp
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.office_1_desk    # replace — desk lamp
        name: Desk Lamp
        icon: mdi:desk-lamp
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.office_1_pc_bars    # replace — PC light bars
        name: PC Light Bars
        icon: mdi:monitor
        show_brightness_control: true
        show_color_control: true
        collapsible_controls: true
