# lovelace/views/01_home.yaml
# Home Overview — status chips, Komfovent summary, quick access.

title: Home
path: home
icon: mdi:home
cards:

  # ── Status chips row ───────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: entity
        entity: sensor.komfovent_outdoor_temperature
        icon: mdi:thermometer
      - type: template
        icon: mdi:lightbulb
        content: >
          {{ states.light | selectattr('state','eq','on') | list | count }} on
      - type: template
        icon: mdi:air-conditioner
        content: >
          {{ states.climate | selectattr('state','ne','off') | list | count }} active
      - type: entity
        entity: select.komfovent_current_mode
        icon: mdi:air-filter
        tap_action:
          action: navigate
          navigation_path: /lovelace/ventilation
      - type: template
        icon: mdi:blinds
        content: >
          {{ states.cover | selectattr('state','eq','open') | list | count }} open

  # ── Komfovent status ───────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.komfovent_supply_temperature') }}°C supply air"
    secondary: "Komfovent — {{ states('select.komfovent_current_mode') }} mode"
    icon: mdi:air-filter
    icon_color: >
      {% if not is_state('climate.komfovent', 'off') %}blue{% else %}grey{% endif %}
    tap_action:
      action: navigate
      navigation_path: /lovelace/ventilation

  # ── Quick Access ───────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Quick Access

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: Living Room
        secondary: Lights and climate
        icon: mdi:sofa
        tap_action:
          action: navigate
          navigation_path: /lovelace/living-room

      - type: custom:mushroom-template-card
        primary: Office 1
        secondary: Samsung AC and desk setup
        icon: mdi:desktop-classic
        tap_action:
          action: navigate
          navigation_path: /lovelace/office

      - type: custom:mushroom-template-card
        primary: Office 2
        secondary: LG AC and lights
        icon: mdi:laptop
        tap_action:
          action: navigate
          navigation_path: /lovelace/office-2

      - type: custom:mushroom-template-card
        primary: Automations
        secondary: Blinds, AC, and ventilation
        icon: mdi:robot
        tap_action:
          action: navigate
          navigation_path: /lovelace/automations
