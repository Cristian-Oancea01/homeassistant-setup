# lovelace/views/01_home.yaml
# Home Overview — presence, house status, ventilation, quick access.

title: Home
path: home
icon: mdi:home
cards:

  # ── Status chips row ───────────────────────────────────────
  - type: custom:mushroom-chips-card
    chips:
      - type: entity
        entity: sensor.komfovent_outdoor_temperature
        icon: mdi:thermometer
      - type: template
        icon: mdi:lightbulb
        content: >
          {{ states.light | selectattr('state','eq','on') | list | count }} on
      - type: template
        icon: mdi:air-conditioner
        content: >
          {{ states.climate | selectattr('state','ne','off') | list | count }} active
      - type: entity
        entity: select.komfovent_current_mode
        icon: mdi:air-filter
        tap_action:
          action: navigate
          navigation_path: /lovelace/ventilation
      - type: template
        icon: mdi:blinds
        content: >
          {{ states.cover | selectattr('state','eq','open') | list | count }} open

  # ── Presence ────────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Presence

  - type: custom:mushroom-template-card
    primary: >
      {% set home = expand('group.all_people') | selectattr('state', 'eq', 'home') | map(attribute='name') | list %}
      {% if home | length == 0 %}
        Nobody is home
      {% elif home | length == 1 %}
        {{ home[0] }} is home
      {% else %}
        {{ home | join(' and ') }} are home
      {% endif %}
    secondary: >
      {% set away = expand('group.all_people') | rejectattr('state', 'eq', 'home') | map(attribute='name') | list %}
      {% if away | length == 0 %}
        Everyone is home
      {% elif away | length == 1 %}
        Away: {{ away[0] }}
      {% else %}
        Away: {{ away | join(', ') }}
      {% endif %}
    icon: mdi:home-account
    icon_color: >
      {% if expand('group.all_people') | selectattr('state', 'eq', 'home') | list | count > 0 %}green{% else %}grey{% endif %}

  # ── House Summary ───────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: House Summary

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: Lights On
        secondary: >
          {{ states.light | selectattr('state','eq','on') | list | count }} active now
        icon: mdi:lightbulb-group
        icon_color: >
          {% if (states.light | selectattr('state','eq','on') | list | count) > 0 %}amber{% else %}grey{% endif %}

      - type: custom:mushroom-template-card
        primary: Climate
        secondary: >
          {{ states.climate | selectattr('state','ne','off') | list | count }} units running
        icon: mdi:air-conditioner
        icon_color: >
          {% if (states.climate | selectattr('state','ne','off') | list | count) > 0 %}blue{% else %}grey{% endif %}

      - type: custom:mushroom-template-card
        primary: Blinds
        secondary: >
          {{ states.cover | selectattr('state','eq','open') | list | count }} open now
        icon: mdi:blinds-open
        icon_color: >
          {% if (states.cover | selectattr('state','eq','open') | list | count) > 0 %}orange{% else %}grey{% endif %}

      - type: custom:mushroom-template-card
        primary: Outdoor
        secondary: "{{ states('sensor.komfovent_outdoor_temperature') }}°C"
        icon: mdi:thermometer-chevron-up
        icon_color: teal

  # ── Komfovent status ───────────────────────────────────────
  - type: custom:mushroom-template-card
    primary: "{{ states('sensor.komfovent_supply_temperature') }}°C supply air"
    secondary: "Komfovent — {{ states('select.komfovent_current_mode') }} mode"
    icon: mdi:air-filter
    icon_color: >
      {% if not is_state('climate.komfovent', 'off') %}blue{% else %}grey{% endif %}
    tap_action:
      action: navigate
      navigation_path: /lovelace/ventilation

  # ── Quick Access ───────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Quick Access

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-template-card
        primary: Living Room
        secondary: Lights and climate
        icon: mdi:sofa
        tap_action:
          action: navigate
          navigation_path: /lovelace/living-room

      - type: custom:mushroom-template-card
        primary: Office 1
        secondary: Samsung AC and desk setup
        icon: mdi:desktop-classic
        tap_action:
          action: navigate
          navigation_path: /lovelace/office

      - type: custom:mushroom-template-card
        primary: Office 2
        secondary: LG AC and lights
        icon: mdi:laptop
        tap_action:
          action: navigate
          navigation_path: /lovelace/office-2

      - type: custom:mushroom-template-card
        primary: Automations
        secondary: Blinds, AC, and ventilation
        icon: mdi:robot
        tap_action:
          action: navigate
          navigation_path: /lovelace/automations
