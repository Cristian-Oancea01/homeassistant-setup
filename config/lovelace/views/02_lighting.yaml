# lovelace/views/02_lighting.yaml
# Lighting view — all lights grouped by room.
#
# Entity IDs below are examples from a Philips Hue setup.
# Replace light.* entity IDs with your own.
# Find yours: Settings → Developer Tools → States → filter "light."

title: Lighting
path: lighting
icon: mdi:lightbulb
cards:

  # ── Living Room ────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Living Room

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-light-card
        entity: light.living_room_main       # replace
        name: Main Light
        show_brightness_control: true
        show_color_temp_control: true
        show_color_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.living_room_floor      # replace
        name: Floor Lamp
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.living_room_island_1   # replace
        name: Island 1
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.living_room_island_2   # replace
        name: Island 2
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

      - type: custom:mushroom-light-card
        entity: light.living_room_table      # replace
        name: Table Light
        show_brightness_control: true
        show_color_temp_control: true
        collapsible_controls: true

  - type: custom:mushroom-title-card
    title: Living Room Spots

  - type: grid
    columns: 4
    square: true
    cards:
      - type: custom:mushroom-light-card
        entity: light.spot_living_1          # replace
        name: Spot 1
        show_brightness_control: true
        collapsible_controls: true
      - type: custom:mushroom-light-card
        entity: light.spot_living_2          # replace
        name: Spot 2
        show_brightness_control: true
        collapsible_controls: true
      - type: custom:mushroom-light-card
        entity: light.spot_living_3          # replace
        name: Spot 3
        show_brightness_control: true
        collapsible_controls: true
      - type: custom:mushroom-light-card
        entity: light.spot_living_4          # replace
        name: Spot 4
        show_brightness_control: true
        collapsible_controls: true

  # ── Bedroom ────────────────────────────────────────────────
  - type: custom:mushroom-title-card
    title: Bedroom

  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:mushroom-light-card
