# scripts/good_night.yaml
# Good Night script — callable from dashboard button or voice command.
# Uses only entities that are expected to exist in the current setup.

good_night:
  alias: Good Night
  icon: mdi:weather-night
  sequence:
    - service: cover.close_cover
      target:
        entity_id: cover.all_velux_covers
    - service: climate.set_temperature
      target:
        entity_id:
          - climate.samsung_ac
          - climate.ac_living_room
          - climate.office_2_air_conditioner
          - climate.midea_ac_bedroom_1
          - climate.midea_ac_bedroom_2
      data:
        temperature: 20
        hvac_mode: >
          {% if states('sensor.komfovent_outdoor_temperature') | float(default=15) > 18 %}
            cool
          {% else %}
            "off"
          {% endif %}
  mode: single
