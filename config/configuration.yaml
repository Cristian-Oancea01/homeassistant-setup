# Loads default set of integrations. Do not remove.
default_config:

lovelace:
  mode: yaml

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes


# ---- Automations ---------------------------------------------------
# Existing automations are in automations/existing.yaml
# Repo automations (blinds, climate, lighting, ventilation) are in
# automations/ alongside. All files in the dir are loaded.
automation: !include_dir_merge_list automations/

script: !include scripts.yaml
scene: !include scenes.yaml

# ---- Cover group (VELUX all-blinds control) ------------------------
# Entity IDs are placeholders — update in integrations/cover_groups.yaml
cover: !include integrations/cover_groups.yaml

# ---- Light groups (office desk/shelf groups) -----------------------
light: !include integrations/light_groups.yaml

# ---- Presence group ------------------------------------------------
# Replace person entity IDs in integrations/groups.yaml
group: !include integrations/groups.yaml

# ---- Google Assistant (bidirectional Google Home) ------------------
# Requires: secrets google_project_id + google_credentials.json
# Comment out if not yet configured.
# google_assistant: !include integrations/google_assistant.yaml

# ---- Logger --------------------------------------------------------
logger:
  default: warning

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
