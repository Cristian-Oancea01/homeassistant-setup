# automations/existing.yaml
# UI-created automations exported from Home Assistant.
#
# This file is managed by the HA UI (Settings → Automations).
# When you export automations from the UI, paste them here.
#
# NOTE: device_id values are instance-specific — they will differ on
# every HA installation. After cloning this repo you must recreate
# these automations via the UI or update the device_id and entity_id
# values to match your own installation.
#
# Example structure (replace with your exported automations):

# - id: 'unique_automation_id'
#   alias: My Automation Name
#   description: ''
#   triggers:
#     - trigger: sun
#       event: sunset
#       offset: 0
#   conditions: []
#   actions:
#     - type: turn_on
#       device_id: YOUR_DEVICE_ID       # replace with your device_id
#       entity_id: YOUR_ENTITY_ID       # replace with your entity_id
#       domain: light
#   mode: single
