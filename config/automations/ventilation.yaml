# automations/ventilation.yaml
# Konfortvent HRV automations: humidity boost, away mode, return home.

- alias: konfortvent_boost_on_humidity
  id: konfortvent_boost_on_humidity
  description: Switch Konfortvent to boost when humidity exceeds 65%
  trigger:
    - platform: numeric_state
      entity_id: sensor.konfortvent_humidity    # replace with your entity
      above: 65
  action:
    - service: select.select_option
      target:
        entity_id: select.konfortvent_mode      # replace with your entity
      data:
        option: boost
    - wait_for_trigger:
        - platform: numeric_state
          entity_id: sensor.konfortvent_humidity
          below: 55
      timeout:
        minutes: 30
    - service: select.select_option
      target:
        entity_id: select.konfortvent_mode
      data:
        option: normal
  mode: single

- alias: konfortvent_away_mode
  id: konfortvent_away_mode
  description: Switch ventilation to away mode when nobody is home
  trigger:
    - platform: state
      entity_id: group.all_people
      to: "not_home"
  action:
    - service: select.select_option
      target:
        entity_id: select.konfortvent_mode
      data:
        option: away
  mode: single

- alias: konfortvent_return_home
  id: konfortvent_return_home
  description: Restore normal ventilation when someone arrives home
  trigger:
    - platform: state
      entity_id: group.all_people
      to: "home"
  action:
    - service: select.select_option
      target:
        entity_id: select.konfortvent_mode
      data:
        option: normal
  mode: single
